---
- name: Monitor disk space across all servers
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    disk_issues: []

  tasks:
    - name: Get disk usage for all relevant filesystems
      ansible.builtin.shell:
        cmd: >
          df -BM --output=target,fstype,size,used,avail,pcent
          | tail -n +2
          | grep -v -E '({{ disk_exclude_types | join("|") }})'
      register: disk_output
      changed_when: false

    - name: Parse disk usage and identify issues
  ansible.builtin.set_fact:
    disk_status: "{{ disk_status | default([]) + [ {
      'mount': parts[0],
      'fstype': parts[1],
      'total_mb': (parts[2] | replace('M','') | int),
      'used_mb': (parts[3] | replace('M','') | int),
      'avail_mb': (parts[4] | replace('M','') | int),
      'percent': (parts[5] | replace('%','') | int),
      'status': (
        'EMERGENCY' if (parts[5] | replace('%','') | int) >= disk_emergency_threshold
        else 'CRITICAL' if (parts[5] | replace('%','') | int) >= disk_critical_threshold
        else 'WARNING' if (parts[5] | replace('%','') | int) >= disk_warning_threshold
        else 'OK'
      )
    } ] }}"
  vars:
    parts: "{{ item.split() }}"
  loop: "{{ disk_output.stdout_lines }}"
  when:
    - parts | length >= 6
    - (parts[2] | replace('M','') | int) > disk_min_size_mb

    - name: Identify partitions with issues
      ansible.builtin.set_fact:
        disk_issues: "{{ disk_status | selectattr('status', 'ne', 'OK') | list }}"

    - name: Display disk status summary
      ansible.builtin.debug:
        msg: |
          === Disk Status for {{ inventory_hostname }} ===
          {% for disk in disk_status %}
          [{{ disk.status }}] {{ disk.mount }} - {{ disk.percent }}% used ({{ disk.avail_mb }}MB free)
          {% endfor %}
