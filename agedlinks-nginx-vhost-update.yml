---
- name: Update nginx config
  hosts: webservers
  become: true

  tasks:
    - name: Backup old config
      copy:
        src: /etc/nginx/nginx.conf
        dest: /etc/nginx/nginx.conf.bak
        remote_src: true

    - name: Upload nginx config
      template:
        src: templates/agedlinks.conf.j2
        dest: /etc/nginx/sites-available/agedlinks.conf
        owner: root
        group: root
        mode: '0644'

    - name: Test nginx config
      command: nginx -t
      register: nginx_test

    - name: Show nginx test
      debug:
        var: nginx_test.stdout

    - name: Restart nginx
      service:
        name: nginx
        state: restarted
